name: FasterVPN Auto Update

# 触发条件：每4小时运行一次，或者你手动点击运行
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 授予机器人读写权限，否则无法更新 proxies.yaml
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Search and Test Script
        env:
          # 将你之前设置的 Secret 注入到脚本的环境变量中
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxies.yaml
          # 如果没有文件变动，直接退出而不报错
          git commit -m "Auto-update nodes: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
