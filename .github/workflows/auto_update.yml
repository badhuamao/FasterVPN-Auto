name: FasterVPN Auto Update

on:
  schedule:
    - cron: '0 */4 * * *' # 每4小时跑一次，保持节点新鲜
  workflow_dispatch:      # 允许你手动点击按钮立刻运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 必须开启写入权限，否则无法更新 proxies.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Execute script
        run: python main.py

      - name: Push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxies.yaml
          git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
